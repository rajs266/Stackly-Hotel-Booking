<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Stackly</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/webp" href="assets/top-logo.webp?v=1" />
  <style>
    .error-page {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      position: relative;
      overflow: hidden;
      background: #0d1b0a;
    }

    .error-page__bg {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(13, 27, 10, 0.88) 0%, rgba(45, 90, 39, 0.75) 50%, rgba(13, 27, 10, 0.92) 100%),
        url('assets/site-photo-29.webp') center / cover no-repeat;
      transition: transform 12s ease-out;
    }

    .error-page:hover .error-page__bg {
      transform: scale(1.04);
    }

    .error-page__blobs span {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      animation: errorBlob 10s ease-in-out infinite alternate;
    }

    .error-page__blobs span:nth-child(1) {
      width: 280px;
      height: 280px;
      background: var(--clr-amber);
      top: 10%;
      left: 8%;
    }

    .error-page__blobs span:nth-child(2) {
      width: 220px;
      height: 220px;
      background: var(--clr-sage);
      bottom: 15%;
      right: 10%;
      animation-delay: 2s;
    }

    @keyframes errorBlob {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(20px, -15px) scale(1.1); }
    }

    .error-card {
      position: relative;
      z-index: 2;
      background: rgba(255, 255, 255, 0.96);
      border-radius: var(--r-xl);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
      padding: clamp(2.25rem, 6vw, 3.5rem);
      max-width: 520px;
      width: 100%;
      text-align: center;
      animation: errorCardIn 0.8s var(--ease-out) both;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: transform var(--dur-base) var(--ease-out), box-shadow var(--dur-base);
      overflow: hidden;
    }

    .error-card::before {
      content: '404';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
      font-family: var(--font-display);
      font-size: clamp(12rem, 42vw, 20rem);
      font-weight: 700;
      color: rgba(45, 90, 39, 0.04);
      line-height: 1;
      letter-spacing: 0.1em;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }

    .error-page:hover .error-card {
      transform: translateY(-4px);
      box-shadow: 0 32px 72px rgba(0, 0, 0, 0.4);
    }

    @keyframes errorCardIn {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .error-logo {
      max-width: 140px;
      height: auto;
      margin: 0 auto 1.25rem;
      animation: errorFloat 3s ease-in-out infinite;
    }

    @keyframes errorFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .error-code {
      font-family: var(--font-display);
      font-size: 6rem !important;
      font-weight: 900;
      line-height: 0.82;
      margin: 0.25rem 0 0.75rem;
      letter-spacing: -0.05em;
      position: relative;
      z-index: 1;
      color: #2d5a27; /* Changed to a visible forest green */
      filter: drop-shadow(0 18px 36px rgba(45, 90, 39, 0.3));
      text-shadow: 3px 3px 0px rgba(255,255,255,0.12);
      animation: errorCodeIn 0.9s var(--ease-out) 0.2s both,
                 errorCodePulse 3s ease-in-out 1.5s infinite,
                 errorCodeGlow 4s ease-in-out 2s infinite alternate,
                 colorShift 5s infinite alternate; /* Added color shifting animation */
      transition: filter 0.4s var(--ease-out), transform 0.4s var(--ease-out), color 0.3s;
      display: inline-block;
    }

    @keyframes colorShift {
      0% { color: #2d5a27; }
      50% { color: #e67e22; }
      100% { color: #2d5a27; }
    }

    .error-code:hover {
      filter: drop-shadow(0 40px 80px rgba(45, 90, 39, 0.5));
      transform: scale(1.05) rotate(-1deg);
    }

    @keyframes errorCodeIn {
      from {
        opacity: 0;
        transform: translateY(35px) scale(0.8);
        filter: drop-shadow(0 5px 15px rgba(45, 90, 39, 0.1));
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: drop-shadow(0 18px 36px rgba(45, 90, 39, 0.3));
      }
    }

    @keyframes errorCodePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    @keyframes errorCodeGlow {
      0% {
        filter: drop-shadow(0 18px 36px rgba(45, 90, 39, 0.25));
      }
      100% {
        filter: drop-shadow(0 35px 70px rgba(230, 126, 34, 0.4));
      }
    }

    @keyframes errorFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .error-code::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: 0.15em;
      width: 60%;
      height: 4px;
      background: var(--clr-amber);
      transform: translateX(-50%) scaleX(0);
      animation: errorUnderline 1s var(--ease-out) 0.6s forwards;
    }

    @keyframes errorUnderline {
      to { transform: translateX(-50%) scaleX(1); }
    }

    .error-card h2 {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      color: var(--clr-ink);
      margin-bottom: 0.75rem;
      position: relative;
      z-index: 1;
    }

    .error-card p {
      color: var(--clr-ink-60);
      margin-bottom: 1.75rem;
      font-size: 1rem;
      line-height: 1.65;
    }

    .error-actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .error-actions .btn {
      min-height: 52px;
      width: 100%;
      justify-content: center;
    }

    .error-actions .btn--ghost {
      border: 2px solid var(--clr-forest);
      color: var(--clr-forest);
      background: transparent;
    }

    .error-actions .btn--ghost:hover {
      background: var(--clr-sage-pale);
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-page__bg" aria-hidden="true"></div>
    <div class="error-page__blobs" aria-hidden="true">
      <span></span>
      <span></span>
    </div>
    <div class="error-card">
      <a href="index.html"><img src="assets/logo.webp" alt="Stackly" class="error-logo" width="150" height="48" /></a>
      <p class="error-code" aria-hidden="true">404</p>
      <h2>Lost in the woods?</h2>
      <p>The page you requested could not be found. It may have moved or the link is outdated.</p>
      <div class="error-actions">
        <a href="index.html" class="btn btn--accent">Back to Home</a>
        <button type="button" class="btn btn--ghost" id="errorGoBack">Go Back</button>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('errorGoBack').addEventListener('click', function () {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
