<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A4D68" />
  <title>Sign In — Stackly</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="assets/logo.webp" type="image/webp" />
</head>
<body>
  <header class="navbar navbar--static scrolled" id="navbar">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo"><img src="assets/logo.webp" alt="Stackly" width="150" height="48" /></a>
      <nav class="navbar__nav">
        <a href="index.html" class="navbar__link">Home</a>
        <a href="signup.html" class="navbar__link">Get Started</a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <div class="ambient-blobs" aria-hidden="true"><span></span><span></span><span></span></div>
    <div class="auth-card scale-in in-view">
      <a href="index.html" class="auth-logo" style="display:block;text-align:center;margin-bottom:1rem;">
        <img src="assets/logo.webp" alt="Stackly" width="150" height="48" />
      </a>
      <h1 class="t-heading" style="font-size:1.75rem;text-align:center;margin-bottom:0.25rem;">Sign In</h1>
      <p class="t-body" style="text-align:center;margin-bottom:1.25rem;font-size:0.9rem;">Role-based access — Guest, Staff, or Admin</p>

      <div class="auth-role-tabs" role="tablist">
        <button type="button" class="auth-role-tab active" data-role="guest">Guest</button>
        <button type="button" class="auth-role-tab" data-role="staff">Staff</button>
        <button type="button" class="auth-role-tab" data-role="admin">Admin</button>
      </div>

      <form id="loginForm" novalidate>
        <input type="hidden" id="loginRole" value="guest" />
        <div class="form-group" style="margin-bottom:1rem;">
          <label class="form-label" for="loginEmail">Email</label>
          <input class="form-input" type="email" id="loginEmail" required autocomplete="email" placeholder="you@email.com" />
        </div>
        <div class="form-group" style="margin-bottom:1.25rem;">
          <label class="form-label" for="loginPassword">Password</label>
          <input class="form-input" type="password" id="loginPassword" required autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn--accent w-full" style="min-height:56px;">Sign In</button>
      </form>

      <p class="t-body" style="text-align:center;margin-top:1rem;font-size:0.9rem;">
        New here? <a href="signup.html" style="color:var(--clr-forest);font-weight:600;">Create account</a>
      </p>

      <div class="auth-demo">
        <strong>Demo logins:</strong><br>
        Guest — guest@stackly.in / guest123<br>
        Staff — staff@stackly.in / staff123<br>
        Admin — admin@stackly.in / admin123
      </div>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>
  <script src="scripts/auth.js"></script>
  <script src="scripts/app.js" defer></script>
  <script>
    (function () {
      var tabs = document.querySelectorAll('.auth-role-tab');
      var roleInput = document.getElementById('loginRole');
      tabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          tabs.forEach(function (t) { t.classList.remove('active'); });
          tab.classList.add('active');
          roleInput.value = tab.dataset.role;
        });
      });
      document.getElementById('loginForm').addEventListener('submit', function (e) {
        e.preventDefault();
        var res = StacklyAuth.login(
          document.getElementById('loginEmail').value,
          document.getElementById('loginPassword').value,
          roleInput.value
        );
        if (res.ok) {
          if (window.StacklyToast) StacklyToast('Welcome back, ' + res.user.name + '!', 'success');
          setTimeout(function () { window.location.href = res.redirect; }, 400);
        } else if (window.StacklyToast) {
          StacklyToast(res.message, 'error');
        } else {
          alert(res.message);
        }
      });
      if (StacklyAuth.getSession()) {
        window.location.href = StacklyAuth.dashboardUrl(StacklyAuth.getSession().role);
      }
    })();
  </script>
</body>
</html>
