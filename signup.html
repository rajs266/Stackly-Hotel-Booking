<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A4D68" />
  <title>Get Started — Stackly</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="assets/logo.webp" type="image/webp" />
</head>
<body>
  <header class="navbar navbar--static scrolled" id="navbar">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo"><img src="assets/logo.webp" alt="Stackly" width="150" height="48" /></a>
      <nav class="navbar__nav">
        <a href="index.html" class="navbar__link">Home</a>
        <a href="login.html" class="navbar__link">Sign In</a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <div class="ambient-blobs" aria-hidden="true"><span></span><span></span><span></span></div>
    <div class="auth-card scale-in in-view">
      <a href="index.html" style="display:block;text-align:center;margin-bottom:1rem;">
        <img src="assets/logo.webp" alt="Stackly" width="150" height="48" />
      </a>
      <h1 class="t-heading" style="font-size:1.75rem;text-align:center;margin-bottom:0.25rem;">Create Account</h1>
      <p class="t-body" style="text-align:center;margin-bottom:1.25rem;font-size:0.9rem;">Join as Guest or Staff — start booking in minutes</p>

      <div class="auth-role-tabs">
        <button type="button" class="auth-role-tab active" data-role="guest">Guest</button>
        <button type="button" class="auth-role-tab" data-role="staff">Staff</button>
      </div>

      <form id="signupForm" novalidate>
        <input type="hidden" id="signupRole" value="guest" />
        <div class="form-group" style="margin-bottom:1rem;">
          <label class="form-label" for="signupName">Full Name</label>
          <input class="form-input" type="text" id="signupName" required placeholder="Your name" />
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
          <label class="form-label" for="signupEmail">Email</label>
          <input class="form-input" type="email" id="signupEmail" required placeholder="you@email.com" />
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
          <label class="form-label" for="signupPassword">Password</label>
          <input class="form-input" type="password" id="signupPassword" required minlength="6" placeholder="Min 6 characters" />
        </div>
        <div class="form-group" style="margin-bottom:1.25rem;">
          <label class="form-label" for="signupPhone">Phone</label>
          <input class="form-input" type="tel" id="signupPhone" placeholder="+91 9XXXXXXXXX" />
        </div>
        <button type="submit" class="btn btn--accent w-full" style="min-height:56px;">Get Started</button>
      </form>

      <p class="t-body" style="text-align:center;margin-top:1rem;font-size:0.9rem;">
        Already registered? <a href="login.html" style="color:var(--clr-forest);font-weight:600;">Sign in</a>
      </p>
    </div>
  </main>

  <div class="toast-container" id="toastContainer"></div>
  <script src="scripts/auth.js"></script>
  <script src="scripts/app.js" defer></script>
  <script>
    (function () {
      var tabs = document.querySelectorAll('.auth-role-tab');
      var roleInput = document.getElementById('signupRole');
      tabs.forEach(function (tab) {
        tab.addEventListener('click', function () {
          tabs.forEach(function (t) { t.classList.remove('active'); });
          tab.classList.add('active');
          roleInput.value = tab.dataset.role;
        });
      });
      document.getElementById('signupForm').addEventListener('submit', function (e) {
        e.preventDefault();
        var res = StacklyAuth.signup({
          name: document.getElementById('signupName').value,
          email: document.getElementById('signupEmail').value,
          password: document.getElementById('signupPassword').value,
          role: roleInput.value
        });
        if (res.ok) {
          if (window.StacklyToast) StacklyToast('Account created!', 'success');
          setTimeout(function () { window.location.href = res.redirect; }, 400);
        } else if (window.StacklyToast) StacklyToast(res.message, 'error');
      });
      if (StacklyAuth.getSession()) {
        window.location.href = StacklyAuth.dashboardUrl(StacklyAuth.getSession().role);
      }
    })();
  </script>
</body>
</html>
